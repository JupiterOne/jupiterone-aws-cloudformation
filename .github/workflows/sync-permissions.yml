name: Sync IAM Permissions Scheduled Update

on:
  # Should run every time a PR is opened (validation only - no commit).
  # Scoped to paths that affect template generation so unrelated PRs are
  # not charged unnecessary CI minutes.
  pull_request:
    paths:
      - 'cloudformation/**'
      - 'scripts/**'
      - '.github/workflows/sync-permissions.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
  # Allows running this workflow manually from the Actions tab
  workflow_dispatch:
  schedule:
    # Run once every eight hours
    - cron: '0 */8 * * *'

jobs:
  sync-permissions:
    # Use the public runner for PR validation so fork PRs cannot execute
    # arbitrary code on the self-hosted runner. The self-hosted runner is
    # only used for schedule/dispatch where secrets are needed for the commit.
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-latest' || 'scaleset-jupiterone-infra-arm64' }}
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # Use the automation PAT so the resulting commit can re-trigger CI
          # (commits made with the default GITHUB_TOKEN do not trigger workflows).
          token: ${{ secrets.AUTO_GITHUB_PAT_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate (PR only - never writes)
        if: github.event_name == 'pull_request'
        # Use the checked-in fixture so PR validation does not depend on
        # the live upstream endpoint being available.
        run: INGESTION_SOURCES_FILE=scripts/__tests__/__fixtures__/ingestion-sources.json pnpm sync:permissions:check

      - name: Regenerate templates from upstream ingestion sources
        if: github.event_name != 'pull_request'
        run: pnpm sync:permissions

      - name: Validate IAM policy sizes
        if: github.event_name != 'pull_request'
        run: pnpm validate:policies

      - name: Commit changes
        if: github.event_name != 'pull_request'
        uses: EndBug/add-and-commit@a94899bca583c204427a224a7af87c02f9b325d5  # v9.1.4
        with:
          message: 'Sync IAM permissions from upstream ingestion sources'
          # Restrict the commit to the cloudformation/ tree so no other files
          # accidentally ride along.
          add: "['cloudformation/']"
          author_name: j1-internal-automation
          author_email: internal-automation.bot@jupiterone.com
